<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري - مرحبا بك</title>
    
    <!-- Meta Tag التحقق من Heleket (النسخة المعدلة حسب طلبك) -->
    <meta name="heleket" content="4fc5c28f" />
    
    <meta name="description" content="متجر إلكتروني آمن - دفع بالعملات المشفرة عبر Heleket">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
            padding: 60px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 50px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: #27ae60;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        .success {
            color: #27ae60;
            font-weight: bold;
            margin: 25px 0;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 16px 35px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #219653;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>مرحباً بك في متجري</h1>
        <p>تم إضافة Meta Tag التحقق من Heleket بنجاح.</p>
        <p class="success">الآن يمكنك العودة إلى Heleket والضغط على Verify</p>
        
        <button onclick="window.location.href='#'">ابدأ التسوق</button>
        
        <p style="margin-top: 60px; font-size: 14px; color: #666;">
            للتأكد: اضغط F12 → تبويب Elements وابحث عن "heleket"<br>
            يجب أن ترى: <strong>&lt;meta name="heleket" content="4fc5c28f"&gt;</strong>
        </p>
    </div>
</body>
</html>
