<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري - مرحبا بك</title>
    
    <!-- Meta Tag التحقق من Heleket (مهم جداً) -->
    <meta name="heleket" content="4fc5c28f" />
    
    <meta name="description" content="متجر إلكتروني آمن يقبل الدفع بالعملات المشفرة">
    <meta name="keywords" content="متجر, عملات مشفرة, heleket, دفع كريبتو">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #27ae60;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #219653;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>مرحبا بك في متجري</h1>
        <p>هذه الصفحة الرئيسية جاهزة للنشر على Railway.</p>
        <p>تم إضافة Meta Tag التحقق من Heleket بنجاح.</p>
        
        <button onclick="alert('سيتم توجيهك إلى صفحة الدفع قريباً')">ابدأ التسوق الآن</button>
        
        <p style="margin-top: 50px; font-size: 14px; color: #777;">
            بعد النشر، افتح الموقع واضغط F12 → تبويب Elements، وابحث عن "heleket" للتأكد من وجود الـ Meta Tag.
        </p>
    </div>
</body>
</html>
